{% load i18n static tailwind_tags %}
<!DOCTYPE html>
<html lang="en" data-theme="django-starter-light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}{% trans "Two-Factor Authentication" %}{% endblock %} | Django Starter</title>
  {% tailwind_css %}
  {% block extra_media %}{% endblock %}
  <style>
    .container {
      width: 100%;
      max-width: 72rem;
      margin-left: auto;
      margin-right: auto;
      padding-left: 1rem;
      padding-right: 1rem;
    }
    .row {
      display: flex;
      flex-wrap: wrap;
    }
    .col-md-5 {
      width: 100%;
    }
    .offset-md-3 {
      margin-left: 0;
    }
    @media (min-width: 768px) {
      .col-md-5 {
        width: 41.666667%;
      }
      .offset-md-3 {
        margin-left: 25%;
      }
    }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 0.5rem;
      border: 1px solid transparent;
      padding: 0.625rem 1rem;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 150ms ease-in-out;
      text-decoration: none;
    }
    .btn-block {
      width: 100%;
    }
    .btn-secondary {
      background-color: var(--color-secondary);
      color: var(--color-secondary-content);
    }
    .btn-secondary:hover {
      filter: brightness(0.95);
    }
    .btn-primary {
      background-color: var(--color-primary);
      color: var(--color-primary-content);
    }
    .btn-primary:hover {
      filter: brightness(0.95);
    }
    .btn-link {
      background: transparent;
      color: var(--color-primary);
      border: none;
      padding: 0.25rem 0.5rem;
    }
    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .btn-sm {
      padding: 0.45rem 0.85rem;
      font-size: 0.8125rem;
    }
    h1 {
      margin: 0 0 0.5rem;
      font-size: 1.5rem;
      line-height: 1.2;
      font-weight: 700;
    }
    p {
      margin: 0 0 1rem;
      color: color-mix(in oklab, var(--color-base-content) 84%, transparent);
    }
    form {
      margin-top: 0.5rem;
    }
    form table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 0.75rem;
    }
    form table th,
    form table td {
      display: block;
      width: 100%;
      text-align: left;
      padding: 0;
    }
    form table th label {
      display: block;
      margin: 0 0 0.35rem;
      font-size: 0.875rem;
      font-weight: 600;
    }
    form input:not([type="submit"]):not([type="button"]):not([type="hidden"]),
    form select,
    form textarea {
      width: 100%;
      border-radius: 0.5rem;
      border: 1px solid color-mix(in oklab, var(--color-base-content) 15%, transparent);
      background-color: var(--color-base-100);
      color: var(--color-base-content);
      padding: 0.625rem 0.75rem;
      margin-bottom: 0.875rem;
    }
    form input:focus,
    form select:focus,
    form textarea:focus {
      outline: none;
      border-color: var(--color-primary);
      box-shadow: 0 0 0 3px color-mix(in oklab, var(--color-primary) 18%, transparent);
    }
    ul.errorlist {
      list-style: none;
      margin: 0 0 0.75rem;
      padding: 0.75rem;
      border-radius: 0.5rem;
      background-color: color-mix(in oklab, var(--color-error) 12%, transparent);
      color: color-mix(in oklab, var(--color-error) 78%, black);
    }
    .helptext {
      display: block;
      margin-top: -0.5rem;
      margin-bottom: 0.875rem;
      font-size: 0.8125rem;
      opacity: 0.8;
    }
    hr {
      margin: 1rem 0;
      border: none;
      border-top: 1px solid color-mix(in oklab, var(--color-base-content) 15%, transparent);
    }
  </style>
</head>
<body class="min-h-screen bg-base-200 text-base-content">
  <main class="flex min-h-screen items-center py-8">
    {% block content_wrapper %}
      <div class="container">
        <div class="card mx-auto w-full max-w-md border border-base-300 bg-base-100 shadow-xl">
          <div class="card-body">
            {% block content %}{% endblock %}
          </div>
        </div>
      </div>
    {% endblock %}
  </main>
</body>
</html>
