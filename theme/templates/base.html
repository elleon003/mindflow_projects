{% load static tailwind_tags %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>{% block title %}MindFlow{% endblock %}</title>
    {% tailwind_css %}
</head>

<body class="bg-base-200 text-base-content min-h-screen font-sans">
    {% if messages %}
    <div class="container mx-auto px-4 pt-4 space-y-2 max-w-3xl">
        {% for message in messages %}
        <div role="alert" class="alert {% if message.tags == 'success' %}alert-success{% elif message.tags == 'error' %}alert-error{% elif message.tags == 'warning' %}alert-warning{% else %}alert-info{% endif %}">
            <span>{{ message }}</span>
        </div>
        {% endfor %}
    </div>
    {% endif %}
    {% block content %}{% endblock %}
</body>
</html>
